name: MailIntel CI

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

jobs:
  test:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install ruff mypy pytest

      - name: Ruff
        run: |
          ruff check .

      - name: Ruff Format Check
        run: |
          ruff format . --check

      - name: MyPy
        run: |
          mypy src

      - name: Pytest
        run: |
          pytest
          